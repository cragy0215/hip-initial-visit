<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>고관절 초진 문진 — 의사용 조회</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap');
:root {
  --navy:#1a3a5c; --teal:#1a7a6e; --teal-light:#e8f5f3;
  --orange:#e8762c; --cream:#f8f6f1; --cream2:#f0ede6;
  --border:#ddd8cf; --text:#1c1c1c; --muted:#6b6560;
  --success:#27ae60; --shadow:0 2px 12px rgba(26,58,92,0.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--cream);color:var(--text);font-size:14px;min-height:100vh;}

.header{background:var(--navy);color:white;padding:18px 20px;}
.header-top{display:flex;align-items:center;gap:12px;}
.header-icon{width:36px;height:36px;background:rgba(255,255,255,0.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.header h1{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;}
.header-sub{font-size:11px;color:rgba(255,255,255,0.7);}
.header-badge{margin-left:auto;background:var(--orange);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;}

.container{max-width:720px;margin:0 auto;padding:20px 16px 60px;}

/* SEARCH */
.search-card{background:white;border-radius:12px;box-shadow:var(--shadow);padding:20px;margin-bottom:20px;}
.search-card h2{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;}
.search-row{display:flex;gap:10px;}
.search-input{flex:1;border:1.5px solid var(--border);border-radius:8px;padding:11px 14px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--text);}
.search-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,122,110,0.12);}
.btn-search{background:var(--navy);color:white;border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
.btn-search:active{opacity:0.85;}

/* TABLE */
.table-card{background:white;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px;}
.table-header{background:var(--navy);color:white;padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between;}
.table-count{font-size:11px;color:rgba(255,255,255,0.7);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:#f0ede6;padding:9px 12px;font-size:12px;font-weight:600;color:var(--navy);text-align:left;white-space:nowrap;border-bottom:1px solid var(--border);}
td{padding:10px 12px;font-size:12px;border-bottom:1px solid #f5f3ef;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafaf8;}
.btn-view{background:var(--teal);color:white;border:none;border-radius:6px;padding:5px 12px;font-size:11px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;white-space:nowrap;}
.btn-view:active{opacity:0.85;}
.nrs-badge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:700;}
.nrs-low{background:#ecfdf5;color:#059669;}
.nrs-mid{background:#fefce8;color:#d97706;}
.nrs-high{background:#fef2f2;color:#dc2626;}

/* EMPTY STATE */
.empty{text-align:center;padding:40px 20px;color:var(--muted);}
.empty .big{font-size:36px;margin-bottom:10px;}

/* DETAIL MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;overflow-y:auto;}
.modal-overlay.open{display:block;}
.modal{background:white;border-radius:16px;max-width:680px;margin:20px auto;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.modal-header{background:var(--navy);color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.modal-header h3{font-family:'Playfair Display',serif;font-size:17px;}
.modal-header .meta{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px;}
.btn-close{background:rgba(255,255,255,0.15);border:none;color:white;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.modal-body{padding:18px 20px;}

/* COPY TABS */
.copy-tabs{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.copy-tab{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.copy-tab.active{background:var(--navy);border-color:var(--navy);color:white;}
.copy-preview{background:#1c1c1c;border-radius:10px;padding:16px;font-family:monospace;font-size:12px;line-height:1.7;color:#e8e8e8;white-space:pre-wrap;max-height:420px;overflow-y:auto;}
.btn-copy{width:100%;margin-top:10px;background:var(--teal);color:white;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-copy.copied{background:var(--success);}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.info-item{background:var(--cream);border-radius:8px;padding:10px 14px;}
.info-item .label{font-size:10px;font-weight:600;color:var(--muted);margin-bottom:2px;}
.info-item .value{font-size:13px;font-weight:600;color:var(--navy);}

/* LOADING */
.loading{text-align:center;padding:30px;color:var(--muted);font-size:13px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="header-icon">🩺</div>
    <div>
      <h1>고관절 초진 문진 — 조회</h1>
      <div class="header-sub">Ewha Hip &amp; Performance Center</div>
    </div>
    <div class="header-badge">의사용</div>
  </div>
</div>

<div class="container">

  <!-- 검색 -->
  <div class="search-card">
    <h2>🔍 환자 검색</h2>
    <div class="search-row">
      <input type="text" class="search-input" id="searchInput" placeholder="이름 또는 병록번호 입력..." onkeydown="if(event.key==='Enter')doSearch()">
      <button class="btn-search" onclick="doSearch()">검색</button>
    </div>
    <div style="margin-top:10px;display:flex;gap:8px;">
      <button onclick="loadAll()" style="background:white;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;font-family:'Noto Sans KR',sans-serif;">전체 보기</button>
      <button onclick="loadToday()" style="background:white;border:1.5px solid var(--border);border-radius:8px;padding:7px 14px;font-size:12px;font-weight:600;color:var(--navy);cursor:pointer;font-family:'Noto Sans KR',sans-serif;">오늘 환자만</button>
    </div>
  </div>

  <!-- 결과 테이블 -->
  <div class="table-card" id="tableCard" style="display:none;">
    <div class="table-header">
      <span>문진 목록</span>
      <span class="table-count" id="tableCount"></span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>제출일시</th>
            <th>성함</th>
            <th>병록번호</th>
            <th>나이/성별</th>
            <th>이환측</th>
            <th>통증부위</th>
            <th>NRS</th>
            <th>조회</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <div class="empty" id="emptyState" style="display:none;">
    <div class="big">🔍</div>
    <p>검색 결과가 없습니다.</p>
  </div>

  <div class="loading" id="loadingState" style="display:none;">
    ⏳ 불러오는 중...
  </div>

</div>

<!-- 상세 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div>
        <h3 id="modalTitle">환자명</h3>
        <div class="meta" id="modalMeta"></div>
      </div>
      <button class="btn-close" onclick="closeModal()">✕ 닫기</button>
    </div>
    <div class="modal-body">
      <div class="info-grid" id="infoGrid"></div>
      <div class="copy-tabs">
        <button class="copy-tab active" onclick="switchTab('structured')">🗂 구조화</button>
        <button class="copy-tab" onclick="switchTab('soap')">🩺 SOAP</button>
        <button class="copy-tab" onclick="switchTab('simple')">📝 단순</button>
      </div>
      <div class="copy-preview" id="copyPreview"></div>
      <button class="btn-copy" id="copyBtn" onclick="copyText()">
        <span>📋</span><span id="copyLabel">클립보드에 복사 (BESTCare 붙여넣기)</span>
      </button>
    </div>
  </div>
</div>

<script>
const SHEETS_ID = '1c3PXmS3ZIQovJ7brhsa-cEAmPBxFqBw2VGOMVJOyzcE';
const API_KEY_NOTICE = ''; // Google Sheets API 대신 Apps Script GET으로 데이터 조회

// Apps Script URL (GET으로 데이터 조회)
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxcU8uD4i5O6KE6Qd_Jje8apvhUzlQFZVQeJriqWCUcsH3IcGriCWPFnq8B19x9eoznsQ/exec';

let allRows = [];
let currentData = null;
let currentTab = 'structured';

// 컬럼 인덱스 정의
const COL = {
  date:0, name:1, dob:2, age:3, sex:4, chart:5,
  height:6, weight:7, bmi:8, job:9,
  side:10, location:11, onset:12, cause:13, char:14,
  nrs_now:15, nrs_worst:16, aggravating:17, relieving:18,
  worst_activity:19, gait:20, sport:21, sport_type:22,
  act_loss_text:23, prev_tx:24, prev_surg:25, prev_dx:26,
  meds_text:27, systemic:28, imaging:29, note:30,
  fai_aggr:31, fai_lock:32, fai_hx:33,
  dgs_sit:34, dgs_rad:35, dgs_spine:36, dgs_move:37, dgs_dance:38,
  gtr_aggr:39, gtr_snap:40, gtr_ref:41,
  ham_loc:42, ham_aggr:43, ham_tear:44, ham_prev:45,
  thigh_loc:46, thigh_ref:47, thigh_trauma:48,
  back_main:49, back_flex:50, back_img:51,
  emr_text:52
};

function g(row, key) { return (row[COL[key]] || '').toString().trim(); }

async function fetchData(query='') {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('tableCard').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';

  try {
    const url = SCRIPT_URL + '?action=get' + (query ? '&q='+encodeURIComponent(query) : '');
    const res = await fetch(url);
    const json = await res.json();
    if(json.rows) {
      allRows = json.rows.filter((_,i) => i > 0); // 헤더 제외
      renderTable(allRows);
    } else {
      showEmpty();
    }
  } catch(e) {
    document.getElementById('loadingState').style.display = 'none';
    alert('데이터를 불러오지 못했습니다.\nApps Script GET 함수를 확인해주세요.');
  }
}

function renderTable(rows) {
  document.getElementById('loadingState').style.display = 'none';

  if(!rows || rows.length === 0) { showEmpty(); return; }

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  rows.forEach((row, i) => {
    const nrs = g(row, 'nrs_now');
    const nrsClass = nrs==='0'||nrs==='1–2' ? 'nrs-low' : nrs==='3–5' ? 'nrs-mid' : 'nrs-high';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${g(row,'date').replace(/\. /g,'.').substring(0,12)}</td>
      <td><strong>${g(row,'name')}</strong></td>
      <td style="color:var(--muted)">${g(row,'chart')||'—'}</td>
      <td>${g(row,'age')}세 ${g(row,'sex')}</td>
      <td>${g(row,'side')}</td>
      <td style="font-size:11px">${g(row,'location').substring(0,20)}</td>
      <td><span class="nrs-badge ${nrsClass}">${nrs}</span></td>
      <td><button class="btn-view" onclick="openModal(${i})">상세보기</button></td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById('tableCard').style.display = 'block';
  document.getElementById('tableCount').textContent = `총 ${rows.length}건`;
}

function showEmpty() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('tableCard').style.display = 'none';
  document.getElementById('emptyState').style.display = 'block';
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if(!q) { alert('검색어를 입력해주세요.'); return; }
  if(allRows.length > 0) {
    // 이미 로드된 데이터에서 필터링
    const filtered = allRows.filter(row =>
      g(row,'name').includes(q) || g(row,'chart').includes(q)
    );
    renderTable(filtered);
  } else {
    fetchData(q);
  }
}

function loadAll() {
  document.getElementById('searchInput').value = '';
  if(allRows.length > 0) renderTable(allRows);
  else fetchData();
}

function loadToday() {
  const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'.').replace('.','');
  if(allRows.length > 0) {
    const filtered = allRows.filter(row => g(row,'date').includes(new Date().getFullYear().toString()));
    renderTable(filtered);
  } else {
    fetchData();
  }
}

function openModal(idx) {
  const row = allRows[idx];
  currentData = row;
  currentTab = 'structured';

  document.getElementById('modalTitle').textContent = `${g(row,'name')} 환자님`;
  document.getElementById('modalMeta').textContent =
    `${g(row,'dob')} / 만 ${g(row,'age')}세 ${g(row,'sex')} / 병록번호: ${g(row,'chart')||'미입력'} / 제출: ${g(row,'date').substring(0,12)}`;

  // 정보 그리드
  document.getElementById('infoGrid').innerHTML = `
    <div class="info-item"><div class="label">이환 측</div><div class="value">${g(row,'side')}</div></div>
    <div class="info-item"><div class="label">통증 부위</div><div class="value" style="font-size:11px">${g(row,'location')}</div></div>
    <div class="info-item"><div class="label">NRS 현재</div><div class="value">${g(row,'nrs_now')}</div></div>
    <div class="info-item"><div class="label">NRS 최악</div><div class="value">${g(row,'nrs_worst')}</div></div>
    <div class="info-item"><div class="label">보행 상태</div><div class="value" style="font-size:11px">${g(row,'gait')}</div></div>
    <div class="info-item"><div class="label">이전 치료</div><div class="value" style="font-size:11px">${g(row,'prev_tx')}</div></div>
  `;

  document.querySelectorAll('.copy-tab').forEach((el,i) =>
    el.classList.toggle('active', i===0));

  renderPreview();
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function closeModalOnBg(e) {
  if(e.target === document.getElementById('modalOverlay')) closeModal();
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.copy-tab').forEach((el,i) =>
    el.classList.toggle('active', ['structured','soap','simple'][i]===tab));
  renderPreview();
}

function renderPreview() {
  const row = currentData;
  let text = '';

  if(currentTab === 'structured' || currentTab === 'soap') {
    // EMR 저장 텍스트 사용 (가장 완전한 형식)
    const emr = g(row, 'emr_text');
    if(emr && currentTab === 'structured') {
      text = emr;
    } else if(currentTab === 'soap') {
      text = buildSOAP(row);
    }
  } else {
    text = buildSimple(row);
  }

  if(!text) text = g(row, 'emr_text') || '저장된 텍스트가 없습니다.';
  document.getElementById('copyPreview').textContent = text;
  document.getElementById('copyLabel').textContent = '📋 클립보드에 복사 (BESTCare 붙여넣기)';
  document.getElementById('copyBtn').classList.remove('copied');
}

function buildSOAP(row) {
  let t = `고관절 초진 (${g(row,'date').substring(0,12)})\n${'─'.repeat(40)}\n\n`;
  t += `[S]\n  Pt: ${g(row,'name')}, ${g(row,'age')}세 ${g(row,'sex')}${g(row,'job')?', '+g(row,'job'):''}${g(row,'chart')?' / 병록번호 '+g(row,'chart'):''}\n`;
  t += `  CC: ${g(row,'side')} ${g(row,'location')} 통증 / ${g(row,'onset')} / ${g(row,'cause')}\n`;
  t += `  양상: ${g(row,'char')}\n  NRS ${g(row,'nrs_now')} (최악 ${g(row,'nrs_worst')})\n`;
  t += `  악화: ${g(row,'aggravating')} / 완화: ${g(row,'relieving')}\n`;
  t += `  보행: ${g(row,'gait')}\n  운동: ${g(row,'sport')}${g(row,'sport_type')?' — '+g(row,'sport_type'):''}\n`;
  if(g(row,'worst_activity')) t += `  가장 불편한 동작: ${g(row,'worst_activity')}\n`;
  if(g(row,'note')) t += `  환자 진술: "${g(row,'note')}"\n`;
  t += `\n[O]\n  ROM: \n  Special tests: \n  Imaging: ${g(row,'imaging')||'없음'}\n`;
  t += `\n[A]\n  Dx: \n\n[P]\n  Tx: \n\n`;
  t += `[PMHx]\n  ${g(row,'prev_tx')}${g(row,'prev_surg')?' — '+g(row,'prev_surg'):''} / ${g(row,'prev_dx')}\n`;
  t += `  복약: ${g(row,'meds_text')||'없음'} / 전신: ${g(row,'systemic')}\n`;
  return t;
}

function buildSimple(row) {
  const lines = [
    `고관절 초진 (${g(row,'date').substring(0,12)})`,
    `${g(row,'name')} / ${g(row,'dob')} / 만${g(row,'age')}세 ${g(row,'sex')}${g(row,'chart')?' / 병록번호: '+g(row,'chart'):''}`,
    g(row,'height')?`${g(row,'height')}cm ${g(row,'weight')}kg${g(row,'bmi')?' BMI '+g(row,'bmi'):''}`:null,
    g(row,'job')?`직업: ${g(row,'job')}`:null,
    `이환측: ${g(row,'side')} / 부위: ${g(row,'location')}`,
    `발생: ${g(row,'onset')} / 원인: ${g(row,'cause')}`,
    `양상: ${g(row,'char')}`,
    `NRS(현재): ${g(row,'nrs_now')} / (최악): ${g(row,'nrs_worst')}`,
    `악화: ${g(row,'aggravating')}`,
    `완화: ${g(row,'relieving')}`,
    `보행: ${g(row,'gait')}`,
    g(row,'worst_activity')?`가장 불편한 동작: ${g(row,'worst_activity')}`:null,
    `치료력: ${g(row,'prev_tx')}${g(row,'prev_surg')?' — '+g(row,'prev_surg'):''}`,
    `진단: ${g(row,'prev_dx')}`,
    `영상: ${g(row,'imaging')||'없음'}`,
    g(row,'note')?`메모: ${g(row,'note')}`:null,
  ];
  return lines.filter(Boolean).join('\n');
}

async function copyText() {
  const text = document.getElementById('copyPreview').textContent;
  try { await navigator.clipboard.writeText(text); }
  catch {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  document.getElementById('copyBtn').classList.add('copied');
  document.getElementById('copyLabel').textContent = '✅ 복사 완료! BESTCare에 붙여넣기 하세요';
  setTimeout(() => {
    document.getElementById('copyBtn').classList.remove('copied');
    document.getElementById('copyLabel').textContent = '📋 클립보드에 복사 (BESTCare 붙여넣기)';
  }, 3000);
}

// 초기 로드
fetchData();
</script>
</body>
</html>
